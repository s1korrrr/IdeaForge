name: Bug report
description: Report reproducible incorrect behavior in IdeaForge.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include recordings, transcripts, credentials, private URLs, local paths, device identifiers, or security details.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [macOS, iOS, watchOS, Community backend]
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or full commit ID
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use synthetic, non-sensitive data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private and security-sensitive data from this report.
          required: true
