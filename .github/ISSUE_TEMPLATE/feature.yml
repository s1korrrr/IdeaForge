name: Feature request
description: Propose a focused, user-centered improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should IdeaForge solve?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: boundary
    attributes:
      label: Scope check
      options:
        - label: This request contains no private recordings, transcripts, credentials, or security details.
          required: true
