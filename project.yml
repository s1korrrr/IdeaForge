name: IdeaForge
options:
  bundleIdPrefix: com.s1kor.ideaforge
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "2NY8A789TN"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    revision: b6496a74a087257ef5e6da1c5b29a447a60f5bd7 # Sparkle 2.9.4
targets:
  IdeaForgeMac:
    type: application
    platform: macOS
    sources:
      - path: Sources/IdeaForgeCore
      - path: Sources/IdeaForgeMac
      - path: Sources/IdeaForgeAssets/MacAssets.xcassets
      - path: LICENSE
        buildPhase: resources
      - path: NOTICE
        buildPhase: resources
      - path: THIRD_PARTY_NOTICES.md
        buildPhase: resources
      - path: ThirdPartyLicenses
        buildPhase: resources
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.s1kor.ideaforge.mac
        PRODUCT_NAME: IdeaForge
        INFOPLIST_FILE: Sources/IdeaForgeMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/IdeaForgeMac/IdeaForgeMac.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIconMac
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
  IdeaForgeiOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/IdeaForgeCore
      - path: Sources/IdeaForgeiOS
      - path: Sources/IdeaForgeAssets/iOSAssets.xcassets
    dependencies:
      - target: IdeaForgeWatch
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.s1kor.ideaforge.ios
        PRODUCT_NAME: IdeaForge
        INFOPLIST_FILE: Sources/IdeaForgeiOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/IdeaForgeiOS/IdeaForgeiOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIconiOS
        CODE_SIGN_STYLE: Automatic
  IdeaForgeWatch:
    type: application
    platform: watchOS
    sources:
      - path: Sources/IdeaForgeCore
      - path: Sources/IdeaForgeWatch
      - path: Sources/IdeaForgeAssets/WatchAssets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.s1kor.ideaforge.ios.watch
        PRODUCT_NAME: IdeaForge Watch
        INFOPLIST_FILE: Sources/IdeaForgeWatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIconWatch
        CODE_SIGN_STYLE: Automatic
  IdeaForgeMacUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/IdeaForgeMacUITests
    dependencies:
      - target: IdeaForgeMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.s1kor.ideaforge.mac.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: IdeaForgeMac
  IdeaForgeiOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/IdeaForgeiOSUITests
    dependencies:
      - target: IdeaForgeiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.s1kor.ideaforge.ios.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: IdeaForgeiOS
schemes:
  IdeaForgeMac:
    build:
      targets:
        IdeaForgeMac: all
        IdeaForgeMacUITests: [test]
    test:
      targets:
        - name: IdeaForgeMacUITests
  IdeaForgeiOS:
    build:
      targets:
        IdeaForgeiOS: all
        IdeaForgeiOSUITests: [test]
    test:
      targets:
        - name: IdeaForgeiOSUITests
  IdeaForgeWatch:
    build:
      targets:
        IdeaForgeWatch: all
